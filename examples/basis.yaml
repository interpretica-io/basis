constellation: example
version: 1.0.0
email_domain: example.com

tasks:
  # build is one-shot: run it inline, no display.
  run:
    display: services     # long-running: open the "services" display, one pane per repo
    layout: even-vertical

repos:
  - name: core
    path: core
    lang: rust
    url: https://github.com/example/core
    actions:
      build: [cargo build --release]
      run: [cargo run --release]
      clean: [cargo clean]

  - name: engine
    path: engine
    lang: cpp
    url: git@github.com:example/engine.git
    version_file: .version
    cmake_file: CMakeLists.txt
    actions:
      build:
        - cmake -B build -S .
        - cmake --build build
      run: ["./build/engine"]
      clean: [rm -rf build]

displays:
  dev:
    layout: main-vertical
    panes:
      - { repo: core,   command: "cargo watch -x run" }
      - { repo: engine, action: build }
      - { name: shell }
