constellation: example
version: 1.0.0
email_domain: example.com

repos:
  - name: core
    path: core
    lang: rust
    url: https://github.com/example/core
    actions:
      build: [cargo build --release]
      clean: [cargo clean]

  - name: engine
    path: engine
    lang: cpp
    url: git@github.com:example/engine.git
    version_file: .version
    cmake_file: CMakeLists.txt
    actions:
      build:
        - cmake -B build -S .
        - cmake --build build
      clean: [rm -rf build]
